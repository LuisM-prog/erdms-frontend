<div class="wireframe-container">
  
  <aside class="left-sidebar">
    <div class="user-avatar-area"></div>
    
    <nav class="nav-links-stack">
      <button (click)="navigateToTab('/user/dashboard')" class="nav-tab-btn">
        <span class="btn-icon">📊</span> Dashboard
      </button>
      <button (click)="navigateToTab('/user/document-management')" class="nav-tab-btn">
        <span class="btn-icon">📁</span> Document Management
      </button>
      <button (click)="navigateToTab('/user/user-profile')" class="nav-tab-btn active">
        <span class="btn-icon">👤</span> Profile
      </button>
    </nav>
  </aside>

  <main class="viewport-main">
    <header class="top-navbar-bar">
      <div class="spacer-flex"></div>
      <button (click)="executeSignOut()" class="log-out-action-button">
        🚪 Log out
      </button>
    </header>

    <div class="main-body-workspace">
      <div class="identity-badge-row">
        <div class="badge-text-name">Account Settings</div>
      </div>

      <div class="profile-layout-grid">
        
        <div class="profile-card-panel">
          <div class="panel-heading">Personal Information</div>
          
          <div class="form-control-stack">
            <div class="form-group">
              <label class="wireframe-field-label">Full Name</label>
              <input type="text" [(ngModel)]="updatedName" name="updatedName" class="wireframe-text-input" />
            </div>

            <div class="form-group">
              <label class="wireframe-field-label">Email Address</label>
              <input type="email" [(ngModel)]="updatedEmail" name="updatedEmail" class="wireframe-text-input" />
            </div>

            <div class="form-group">
              <label class="wireframe-field-label">Assigned Position</label>
              <div class="readonly-badge-input">
                <span class="lock-icon">🔒</span> {{ userPosition }}
              </div>
              <small class="helper-hint-text">Position roles are restricted parameters and can only be altered by system administrators.</small>
            </div>

            <button (click)="saveProfileChanges()" class="profile-action-save-btn">
              💾 Save Profile Details
            </button>
          </div>
        </div>

        <div class="profile-card-panel">
          <div class="panel-heading">Change Password for Security</div>
          
          <div class="form-control-stack">
            <div class="form-group">
              <label class="wireframe-field-label">Current Password</label>
              <input type="password" [(ngModel)]="currentPasswordInput" name="currentPasswordInput" placeholder="••••••••" class="wireframe-text-input" />
            </div>

            <div class="form-group">
              <label class="wireframe-field-label">New Password</label>
              <input type="password" [(ngModel)]="newPasswordInput" name="newPasswordInput" placeholder="Enter new password" class="wireframe-text-input" />
            </div>

            <div class="form-group">
              <label class="wireframe-field-label">Confirm New Password</label>
              <input type="password" [(ngModel)]="confirmPasswordInput" name="confirmPasswordInput" placeholder="Repeat new password" class="wireframe-text-input" />
            </div>

            <button (click)="changeUserPassword()" class="profile-action-save-btn security-theme-btn">
              🛡️ Update Security Credentials
            </button>
          </div>
        </div>

      </div>

    </div>
  </main>

</div>
