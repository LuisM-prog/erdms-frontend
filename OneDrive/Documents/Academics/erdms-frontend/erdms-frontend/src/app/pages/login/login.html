<div style="display: flex; height: 100vh; width: 100vw; background-color: #f1f5f9; font-family: 'Segoe UI', sans-serif; align-items: center; justify-content: center; margin: 0; padding: 0; box-sizing: border-box;">
  <div style="background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box;">
    
    <div style="text-align: center; margin-bottom: 32px;">
      <span style="font-size: 40px;">🛡️</span>
      <h2 style="margin: 12px 0 4px 0; color: #0f172a; font-size: 24px; font-weight: 700;">ERDMS Portal</h2>
      <p style="margin: 0; color: #64748b; font-size: 14px;">Sign in to access your platform matrix</p>
    </div>

    <form (ngSubmit)="executeAuthentication()" style="display: flex; flex-direction: column; gap: 20px;">
      
      <div>
        <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Email Address</label>
        <input type="email" [(ngModel)]="loginEmail" name="loginEmail" placeholder="janedoe@example.com" required
               style="width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none;">
      </div>

      <div>
        <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Password</label>
        <input type="password" [(ngModel)]="loginPassword" name="loginPassword" placeholder="••••••••" required
               style="width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none;">
      </div>

      <button type="submit" 
              style="width: 100%; padding: 12px; background-color: #2563eb; color: #ffffff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
        Sign In
      </button>

    </form>

  </div>
</div>
