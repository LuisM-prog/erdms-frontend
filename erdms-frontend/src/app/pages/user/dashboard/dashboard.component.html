<div class="wireframe-container">
  
  <aside class="left-sidebar">
    <div class="user-avatar-area"></div>
    
    <nav class="nav-links-stack">
      <button (click)="navigateToTab('/user/dashboard')" class="nav-tab-btn active">
        <span class="btn-icon">📊</span> Dashboard
      </button>
      <button (click)="navigateToTab('/user/document-management')" class="nav-tab-btn">
        <span class="btn-icon">📁</span> Document Management
      </button>
      <button (click)="navigateToTab('/user/user-profile')" class="nav-tab-btn">
        <span class="btn-icon">👤</span> Profile
      </button>
    </nav>
  </aside>

  <main class="viewport-main">
    <header class="top-navbar-bar">
      <div class="spacer-flex"></div>
      <button (click)="executeSignOut()" class="log-out-action-button">
        🚪 Log out
      </button>
    </header>

    <div class="main-body-workspace">
      <div class="identity-badge-row">
        <div class="badge-text-name">Welcome Back, {{ loggedInUser ? loggedInUser.name : 'User' }}</div>
      </div>

      <div class="dashboard-activity-panel">
        <div class="panel-heading">My Recent Workspace Activity Logs</div>
        
        <div class="timeline-scroll-area">
          <div *ngFor="let log of userLogs" class="activity-timeline-row">
            <div class="activity-content-block">
              <span class="activity-message-text">📝 {{ log.action }}</span>
              <span class="activity-timestamp-label">{{ log.timestamp }}</span>
            </div>
          </div>

          <div *ngIf="userLogs.length === 0" class="empty-timeline-fallback">
            No workspace activity records linked to this account identity loop sequence.
          </div>
        </div>
      </div>

    </div>
  </main>

</div>
