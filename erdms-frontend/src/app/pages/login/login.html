<div style="display: flex; height: 100vh; width: 100vw; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); font-family: 'Segoe UI', sans-serif; align-items: center; justify-content: center; margin: 0; padding: 0; box-sizing: border-box;">
  <div style="background-color: #ffffff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; box-sizing: border-box;">
    
    <div style="text-align: center; margin-bottom: 32px;">
      <span style="font-size: 48px;">🛡️</span>
      <h2 style="margin: 12px 0 4px 0; color: #0f172a; font-size: 24px; font-weight: 700;">ERDMS Portal</h2>
      <p style="margin: 0; color: #64748b; font-size: 14px;">Sign in to access your platform matrix</p>
    </div>

    <!-- Error Message Display -->
    <div *ngIf="errorMessage" style="margin-bottom: 20px; padding: 12px; background-color: #fee2e2; color: #dc2626; border-radius: 8px; font-size: 13px; text-align: center;">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="executeAuthentication()" style="display: flex; flex-direction: column; gap: 20px;">
      
      <div>
        <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Email Address</label>
        <input 
          type="email" 
          [(ngModel)]="loginEmail" 
          (input)="onEmailInput()"
          name="loginEmail" 
          placeholder="" 
          required
          [style.border-color]="emailError ? '#dc2626' : '#cbd5e1'"
          style="width: 100%; padding: 12px 14px; border-width: 1px; border-style: solid; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none;">
        <div *ngIf="emailError" style="font-size: 11px; color: #dc2626; margin-top: 4px;">
          {{ emailError }}
        </div>
      </div>

      <div>
        <label style="display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #334155;">Password</label>
        <input type="password" 
               [(ngModel)]="loginPassword" 
               name="loginPassword" 
               placeholder=" " 
               required
               style="width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none;">
      </div>

      <button type="submit" 
              [disabled]="isLoading || emailError"
              [style.opacity]="isLoading || emailError ? 0.7 : 1"
              style="width: 100%; padding: 12px; background-color: #2563eb; color: #ffffff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

  </div>
</div>
